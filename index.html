<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>바둑 글로벌 뉴스 대시보드</title>

<style>
/* =========================================================
   화면 디자인(CSS). 색·간격·글꼴 등을 바꾸고 싶을 때 이 구역을 만지세요.
   기능과는 상관없으니, 잘 모르겠으면 건드리지 않아도 됩니다.
   ========================================================= */

:root{
  --bg:#0f1115;          /* 전체 배경색 */
  --panel:#181b22;       /* 카드·패널 배경색 */
  --panel-2:#20242e;     /* 살짝 밝은 배경(배지 등) */
  --line:#2a2f3a;        /* 테두리 색 */
  --text:#e8eaed;        /* 기본 글자색 */
  --muted:#9aa2b1;       /* 흐린 글자색(날짜·출처 등) */
  --accent:#4f9dff;      /* 강조색(링크·버튼) */
  --gold:#e5b567;        /* 선수 스포트라이트 강조색 */
  --green:#4ec27a;       /* 상태: 진행중 */
  --blue:#4f9dff;        /* 상태: 예정 */
  --gray:#6b7280;        /* 상태: 종료 */
}

*{ box-sizing:border-box; }
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", "맑은 고딕", sans-serif;
  line-height:1.5;
}

/* 상단 헤더 */
header{
  padding:20px 24px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg, #131722, var(--bg));
}
header h1{ margin:0; font-size:22px; }
header p{ margin:6px 0 0; color:var(--muted); font-size:13px; }

/* 언어 필터 버튼 줄 */
.filters{ display:flex; flex-wrap:wrap; gap:8px; padding:16px 24px; }
.filter-btn{
  background:var(--panel-2); color:var(--text);
  border:1px solid var(--line); border-radius:999px;
  padding:6px 14px; font-size:13px; cursor:pointer;
}
.filter-btn.active{ background:var(--accent); border-color:var(--accent); color:#04121f; font-weight:600; }

/* 검색창 */
.searchbar{ display:flex; align-items:center; gap:10px; padding:0 24px 8px; }
.searchbar input{
  flex:1; max-width:520px; background:var(--panel-2); color:var(--text);
  border:1px solid var(--line); border-radius:10px; padding:9px 12px; font-size:14px;
}
.searchbar input:focus{ outline:none; border-color:var(--accent); }
#search-count{ font-size:12px; color:var(--muted); }

/* 본문: 왼쪽 뉴스 + 오른쪽 기전 패널 (2단 레이아웃) */
.layout{
  display:grid;
  grid-template-columns: 1fr 320px;
  gap:20px;
  padding:8px 24px 40px;
  align-items:start;
}

/* 섹션 공통 제목 */
.section-title{ font-size:15px; margin:20px 0 10px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }

/* 뉴스 카드 : 왼쪽 사진(썸네일) + 오른쪽 내용 (가로 배치) */
.card{
  background:var(--panel); border:1px solid var(--line);
  border-radius:12px; margin-bottom:12px;
  display:flex; gap:16px; overflow:hidden;
}
.card.spotlight{ border-color:var(--gold); background:linear-gradient(180deg,#221d13,var(--panel)); }

/* 카드 왼쪽 사진 영역 */
.thumb{
  flex:0 0 200px; align-self:stretch; min-height:120px;
  position:relative; overflow:hidden; background:var(--panel-2);
}
.thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
/* 사진이 없을 때 쓰는 자동 썸네일(바둑판 격자 + 바둑돌 느낌) */
.thumb-ph{
  width:100%; height:100%; position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  gap:8px; color:#fff; text-align:center; padding:10px;
  background-size:20px 20px;
  background-image:
    linear-gradient(rgba(255,255,255,.10) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.10) 1px, transparent 1px);
}
.thumb-ph .stone{
  width:34px; height:34px; border-radius:50%;
  background:radial-gradient(circle at 34% 30%, #fff, #cfd6e2 40%, #59627a);
  box-shadow:0 2px 6px rgba(0,0,0,.4);
}
.thumb-ph .ph-source{ font-size:12px; font-weight:600; opacity:.95; text-shadow:0 1px 2px rgba(0,0,0,.5); }
/* 언어별 배경색(자동 썸네일) */
.thumb-ph.ko{ background-color:#2d4a63; }
.thumb-ph.ja{ background-color:#5b3350; }
.thumb-ph.zh{ background-color:#5c3a2e; }
.thumb-ph.en{ background-color:#2f4d3a; }

/* 카드 오른쪽 내용 영역 */
.card-body{ flex:1; min-width:0; padding:16px 16px 16px 0; }
.card h3{ margin:0 0 8px; font-size:16px; }
.card h3 a{ color:var(--text); text-decoration:none; }
.card h3 a:hover{ color:var(--accent); text-decoration:underline; }
.card-meta{ display:flex; flex-wrap:wrap; gap:8px 12px; font-size:12px; color:var(--muted); margin-bottom:10px; }
.lang-tag{ background:var(--panel-2); border:1px solid var(--line); border-radius:6px; padding:1px 7px; }
.card-actions{ display:flex; gap:8px; }
.btn-sm{
  background:transparent; color:var(--accent);
  border:1px solid var(--accent); border-radius:8px;
  padding:4px 12px; font-size:12px; cursor:pointer;
}
.btn-sm:hover{ background:rgba(79,157,255,.12); }
.summary-box{
  margin-top:10px; padding:10px; border-radius:8px;
  background:var(--panel-2); font-size:13px; color:var(--muted);
}

/* 오른쪽 기전 패널 */
.side-panel{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px; }
.event{ padding:12px 0; border-bottom:1px solid var(--line); }
.event:last-child{ border-bottom:none; }
.event h4{ margin:0 0 4px; font-size:14px; }
.event .date{ font-size:12px; color:var(--muted); }
.event .note{ font-size:12px; margin-top:6px; }
.badge{ display:inline-block; font-size:11px; font-weight:600; padding:2px 8px; border-radius:999px; color:#04121f; }
.badge.ongoing{ background:var(--green); }
.badge.upcoming{ background:var(--blue); }
.badge.done{ background:var(--gray); color:#fff; }

/* 로딩·에러 안내 박스 */
.status{
  padding:20px; border-radius:12px; border:1px solid var(--line);
  background:var(--panel); color:var(--muted); text-align:center; font-size:14px;
}
.status.error{ border-color:#7a3b3b; background:#241618; color:#f0b8b8; text-align:left; }
.status.error b{ color:#ffd2d2; }

/* 기보 다시보기: 사이드 패널의 대국 목록 버튼 */
.game-link{
  display:block; width:100%; text-align:left;
  background:var(--panel-2); color:var(--text);
  border:1px solid var(--line); border-radius:8px;
  padding:8px 10px; margin-bottom:8px; cursor:pointer; font-size:13px;
}
.game-link:hover{ border-color:var(--accent); }

/* 즉석 기보 불러오기 입력칸 */
.import-box{ display:flex; gap:6px; margin-top:8px; }
.import-box input{
  flex:1; min-width:0; background:var(--panel-2); color:var(--text);
  border:1px solid var(--line); border-radius:8px; padding:7px 9px; font-size:12px;
}
.import-box input:focus{ outline:none; border-color:var(--accent); }

/* 기보 재생 창(모달): 화면 가운데에 바둑판을 띄웁니다 */
.modal{
  display:none; position:fixed; inset:0; z-index:50;
  background:rgba(0,0,0,.65); align-items:center; justify-content:center; padding:16px;
}
.modal-box{
  background:var(--panel); border:1px solid var(--line); border-radius:14px;
  padding:16px; max-width:600px; width:100%; max-height:94vh; overflow:auto;
}
.modal-head{ display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:12px; }
.modal-head b{ font-size:15px; }
#game-board{ display:flex; justify-content:center; }
#game-slider{ width:100%; margin:12px 0 4px; }
.game-controls{ display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap; }
#game-counter{ font-size:13px; color:var(--muted); min-width:64px; text-align:center; }
.blue-row{ display:flex; align-items:center; justify-content:center; gap:10px; margin-top:10px; flex-wrap:wrap; }
#blue-note{ font-size:12px; color:var(--muted); }

/* 모바일(폭이 좁을 때): 2단 → 1단으로 세로로 쌓임 */
@media (max-width: 820px){
  .layout{ grid-template-columns: 1fr; }
  header, .filters, .layout{ padding-left:14px; padding-right:14px; }
  /* 모바일: 카드를 세로로 → 사진이 위, 내용이 아래로 쌓임 */
  .card{ flex-direction:column; }
  .thumb{ flex-basis:auto; width:100%; height:170px; }
  .card-body{ padding:0 16px 16px; }
}
</style>
</head>

<body>

<header>
  <h1>🌐 바둑 글로벌 뉴스 대시보드</h1>
  <p>세계 바둑 뉴스·국제기전·주목 선수를 한 화면에서. (새로고침하면 최신 뉴스를 다시 불러옵니다.)</p>
</header>

<!-- 언어 필터 버튼(자동 생성) + 검색창 -->
<div class="filters" id="filters"></div>
<div class="searchbar">
  <input id="search" type="search" placeholder="🔍 뉴스 검색 (제목·출처로 걸러내기)"
         oninput="onSearch(this.value)" />
  <span id="search-count"></span>
</div>

<div class="layout">
  <!-- 왼쪽: 선수 스포트라이트 + 전체 뉴스 -->
  <main>
    <div id="spotlight-wrap"></div>

    <div class="section-title">전체 뉴스</div>
    <div id="news"></div>
  </main>

  <!-- 오른쪽: 국제기전 일정 패널 + 기보 다시보기 -->
  <aside>
    <div class="section-title">국제기전 일정</div>
    <div class="side-panel" id="events"></div>

    <div class="section-title">기보 다시보기</div>
    <div class="side-panel" id="games"></div>

    <!-- 즉석 기보 불러오기: 링크(직접 .sgf / OGS 대국) 또는 SGF 내용을 붙여넣기 -->
    <div class="import-box">
      <input id="sgf-import" type="text" placeholder="SGF 링크 또는 내용 붙여넣기"
             onkeydown="if(event.key==='Enter')importSgf()" />
      <button class="btn-sm" onclick="importSgf()">열기</button>
    </div>
  </aside>
</div>

<!-- 기보 재생 창(모달). 평소엔 숨겨져 있다가 '기보 보기'를 누르면 나타납니다. -->
<div class="modal" id="game-modal" onclick="if(event.target===this)closeGame()">
  <div class="modal-box">
    <div class="modal-head">
      <b id="game-title"></b>
      <button class="btn-sm" onclick="closeGame()">✕ 닫기</button>
    </div>
    <div id="game-board"></div>
    <input type="range" id="game-slider" min="0" value="0" oninput="gameSeek(this.value)" />
    <div class="game-controls">
      <button class="btn-sm" onclick="gameGo('first')">⏮ 처음</button>
      <button class="btn-sm" onclick="gameGo('prev')">◀ 이전</button>
      <span id="game-counter"></span>
      <button class="btn-sm" onclick="gameGo('next')">다음 ▶</button>
      <button class="btn-sm" onclick="gameGo('last')">끝 ⏭</button>
    </div>
    <!-- AI 추천수(블루스팟): 분석 데이터가 있는 기보에서만 버튼이 보입니다. -->
    <div class="blue-row">
      <button class="btn-sm" id="blue-toggle" onclick="toggleBlue()" style="display:none">🔵 AI추천수</button>
      <span id="blue-note"></span>
    </div>
  </div>
</div>


<script>
/* =========================================================================
   ★★★ 설정 구역 ★★★
   여기 세 개(SOURCES / EVENTS / PLAYERS)만 바꾸면 대부분의 관리가 끝납니다.
   값을 바꾼 뒤 파일을 저장하고, 브라우저에서 새로고침(F5)하면 반영됩니다.
   주의: 각 항목 끝의 쉼표(,)와 따옴표(" ")를 지우지 마세요. 문법이 깨집니다.
   ========================================================================= */


/* -------------------------------------------------------------------------
   1) SOURCES : 가져올 RSS 뉴스 소스 목록
   - name   : 화면에 보일 출처 이름
   - url    : 그 매체의 RSS 주소 (매체 사이트에서 'RSS'로 검색하면 나옵니다)
   - lang   : 언어 코드. "ko"(한국어) / "ja"(일본어) / "zh"(중국어) / "en"(영어)
   - filter : (선택) true로 두면, 그 소스에서 '바둑 관련 기사'만 걸러서 보여줍니다.
              → 연합뉴스·조선일보처럼 '스포츠 전체' 피드를 넣을 때 켜세요.
                (무엇을 바둑 기사로 볼지는 아래 KEYWORDS 목록으로 정합니다.)
              → 구글·Bing처럼 이미 '바둑'으로 검색된 피드는 filter가 필요 없습니다.

   ※ 참고: 네이버·다음 포털은 공개 RSS 서비스를 종료해서 넣어도 작동하지 않습니다.
     대신 아래처럼 '언론사 RSS'를 넣으면 그 언론사(네이버·다음에도 실리는) 기사가 들어옵니다.

   ▶ 새 소스를 추가하려면 { } 한 줄을 복사해 붙이고 값만 바꾸세요.
   ▶ 소스를 빼려면 그 줄을 지우세요.
   ------------------------------------------------------------------------- */
const SOURCES = [
  // ── 검색형 피드: 이미 '바둑'으로 검색돼서 오므로 filter 불필요 ──
  // 구글 검색어 끝의 %20when%3A30d 는 '최근 30일 기사만' 이라는 뜻입니다.
  //   (이게 없으면 구글이 2016년 알파고 같은 오래된 기사를 줄 수 있습니다.
  //    기간을 바꾸려면 30d를 7d(1주)·90d 등으로. %20=공백, %3A=콜론(:))
  { name: "구글뉴스(바둑)",     url: "https://news.google.com/rss/search?q=바둑%20when%3A30d&hl=ko&gl=KR&ceid=KR:ko", lang: "ko" },
  { name: "Bing뉴스(바둑)",     url: "https://www.bing.com/news/search?q=바둑&format=rss", lang: "ko" },
  { name: "구글뉴스(囲碁)",     url: "https://news.google.com/rss/search?q=囲碁%20when%3A30d&hl=ja&gl=JP&ceid=JP:ja",   lang: "ja" },
  { name: "구글뉴스(围棋)",     url: "https://news.google.com/rss/search?q=围棋%20when%3A30d&hl=zh-CN&gl=CN&ceid=CN:zh-Hans", lang: "zh" },
  { name: "구글뉴스(Baduk/Weiqi)",  url: "https://news.google.com/rss/search?q=baduk%20OR%20weiqi%20when%3A30d&hl=en-US&gl=US&ceid=US:en", lang: "en" },

  // ── 언론사 카테고리 피드: '스포츠 전체'라서 filter:true로 바둑 기사만 추립니다 ──
  { name: "연합뉴스",           url: "https://www.yna.co.kr/rss/sports.xml", lang: "ko", filter: true },
  { name: "조선일보",           url: "https://www.chosun.com/arc/outboundfeeds/rss/category/sports/?outputType=xml", lang: "ko", filter: true },
  { name: "SBS",                url: "https://news.sbs.co.kr/news/SectionRssFeed.do?sectionId=07", lang: "ko", filter: true },
];


/* -------------------------------------------------------------------------
   KEYWORDS : filter가 켜진 소스에서 '바둑 관련 기사'로 인정할 단어들.
   기사 제목·요약에 이 중 하나라도 들어 있으면 통과시킵니다.
   ▶ 바둑 기사가 잘 안 걸리면 단어를 더 추가하세요. (예: 새 기전 이름, 새 선수 이름)
   ------------------------------------------------------------------------- */
const KEYWORDS = [
  "바둑", "기전", "기원", "입단", "포석", "대국", "프로기사", "바둑판",
  "신진서", "박정환", "커제", "구쯔하오",
  "LG배", "응씨배", "농심", "삼성화재배", "기왕전", "명인전", "국수전", "천원전",
];


/* -------------------------------------------------------------------------
   2) EVENTS : 국제기전 일정·결과 (오른쪽 패널에 표시)
   - title  : 대회명
   - date   : 날짜(자유롭게 적어도 됩니다. 예: "2026-08-01 ~ 08-10")
   - status : 상태. 반드시 "ongoing"(진행중) / "upcoming"(예정) / "done"(종료) 중 하나
   - note   : 결과·비고 메모 (자유 입력)
   ▶ 대회가 끝나면 status를 "done"으로 바꾸고 note에 결과를 적으면 됩니다.
   ------------------------------------------------------------------------- */
const EVENTS = [
  { title: "제29회 LG배 조선일보 기왕전", date: "2026-07-10 ~ 07-28", status: "ongoing", note: "8강 진행 중 · 한중 대결 주목" },
  { title: "제10회 응씨배 세계선수권",     date: "2026-09-01 ~ 09-15", status: "upcoming", note: "4년마다 열리는 최대 규모 기전" },
  { title: "제27회 농심신라면배",          date: "2026-10-14 ~ 2027-02", status: "upcoming", note: "한·중·일 국가대항전" },
  { title: "제28회 삼성화재배",            date: "2026-05-20 ~ 06-05", status: "done", note: "우승: 신진서 (결승 2-0)" },
];


/* -------------------------------------------------------------------------
   3) PLAYERS : 주목할 선수 이름 목록
   - 기사 제목에 이 이름이 들어가면 위쪽 '선수 스포트라이트'에 강조됩니다.
   - 여러 언어 표기(한자 등)도 함께 넣으면 더 잘 잡힙니다. 예: "신진서", "申真谞"
   ------------------------------------------------------------------------- */
const PLAYERS = [
  "신진서", "申真谞", "Shin Jinseo",
  "구쯔하오", "柯洁",  // 구쯔하오/커제 등
  "박정환",
  "이야마 유타", "井山裕太",
];


/* -------------------------------------------------------------------------
   4) GAMES : 대시보드 안에서 '다시보기'할 대국 기보(SGF) 목록.
   - label : 화면에 보일 대국 이름
   - match : (선택) 기사 제목에 이 단어들 중 하나가 들어 있으면, 그 기사 카드에
             '기보 보기' 버튼이 자동으로 붙습니다.

             비워두면([]) 버튼은 안 붙고, 오른쪽 '기보 다시보기' 목록에서만 열 수 있습니다.
   - sgf    : (방법 A) 기보 파일(SGF)의 내용을 통째로 붙여넣기.
              형식 예: (;GM[1]SZ[19];B[pd];W[dp];B[pq]...)   ← B=흑, W=백, 대괄호 안은 좌표

   ▶ 새 대국을 추가하려면 { } 블록을 복사해 붙이고 값만 바꾸세요.

/* =========================================================================
   기보(SGF) 다시보기 기능
   - SGF: 바둑 대국을 저장하는 표준 텍스트 형식. 예) (;SZ[19];B[pd];W[dp]...)
   - 아래 함수들이 SGF를 읽어 바둑판을 그리고, 한 수씩 앞뒤로 넘겨 보게 합니다.
   ========================================================================= */

/* 지금 열려 있는 기보의 상태를 담습니다. { size, moves, index, label } */
let gamePlayer = null;

/* SGF를 '노드'(; 로 구분되는 마디) 단위로 안전하게 쪼갭니다.
   대괄호[] 안의 ; 는 구분자로 보지 않습니다(주석 안의 ; 때문에 깨지지 않도록). */
function splitSgfNodes(sgf){
  const nodes = []; let cur = ""; let inBracket = false, esc = false;
  for(const ch of sgf){
    if(esc){ cur += ch; esc = false; continue; }
    if(ch === "\\"){ cur += ch; esc = true; continue; }
    if(ch === "["){ inBracket = true; cur += ch; continue; }
    if(ch === "]"){ inBracket = false; cur += ch; continue; }
    if(ch === ";" && !inBracket){ if(cur) nodes.push(cur); cur = ""; continue; }
    cur += ch;
  }
  if(cur) nodes.push(cur);
  return nodes;
}

/* SGF 문자열에서 '바둑판 크기', '착수 목록', 그리고 (있으면) AI 분석 마크업을 뽑아냅니다.
   - 분석은 SGF의 LB[좌표:글자] (라벨) 표기를 읽습니다. AI로 분석해 저장한 기보라면
     추천수가 이 형태로 들어있어, 그 지점을 '블루스팟'으로 그립니다. 없으면 표시 안 함. */
function parseSgf(sgf){
  const sizeMatch = sgf.match(/SZ\[(\d+)\]/);
  const size = sizeMatch ? parseInt(sizeMatch[1], 10) : 19;   // 크기 정보가 없으면 19줄로 봅니다.
  const moves = [];
  const toXY = c => ({ x: c.charCodeAt(0) - 97, y: c.charCodeAt(1) - 97 });

  for(const node of splitSgfNodes(sgf)){
    // 이 노드가 착수(B[..]/W[..])인지 확인. (AB/PB/WR 등 다른 속성은 제외하려고 앞글자 검사)
    const mv = node.match(/(^|[^A-Za-z])([BW])\[([a-z]{0,2})\]/);
    if(!mv) continue;
    const color = mv[2], coord = mv[3];

    // 이 노드에 붙은 AI 분석 라벨(LB) 수집 → 블루스팟 후보.
    // LB는 값이 여러 개 이어질 수 있습니다: LB[dd:A][qf:B][cn:C]  (2번째부터는 LB 접두어 없음)
    const labels = [];
    const lbSection = node.match(/LB((?:\[[a-z]{2}:[^\]]*\])+)/);
    if(lbSection){
      const one = /\[([a-z]{2}):([^\]]*)\]/g;
      let lb;
      while((lb = one.exec(lbSection[1]))){
        const p = toXY(lb[1]);
        labels.push({ x: p.x, y: p.y, text: lb[2] });
      }
    }

    if(coord.length === 2){
      const p = toXY(coord);
      moves.push({ color, x: p.x, y: p.y, labels });
    }else{
      moves.push({ color, pass: true, labels });
    }
  }
  const hasAnalysis = moves.some(m => m.labels && m.labels.length);
  return { size, moves, hasAnalysis };
}

/* 처음부터 count번째 수까지 두었을 때의 바둑판 상태를 계산합니다. (돌 따냄 규칙 포함) */
function buildBoard(size, moves, count){
  const board = Array.from({ length: size }, () => Array(size).fill(null)); // 빈 판
  const inBoard = (x, y) => x >= 0 && y >= 0 && x < size && y < size;
  const opp = c => (c === "B" ? "W" : "B");

  // (x,y) 돌이 속한 그룹의 돌 목록과 '활로(빈 이웃) 개수'를 구합니다.
  function groupInfo(x, y){
    const color = board[y][x];
    const stack = [[x, y]], seen = new Set([x + "," + y]), stones = [], libs = new Set();
    while(stack.length){
      const [cx, cy] = stack.pop(); stones.push([cx, cy]);
      for(const [nx, ny] of [[cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]]){
        if(!inBoard(nx, ny)) continue;
        const v = board[ny][nx];
        if(v === null) libs.add(nx + "," + ny);                 // 빈 자리 → 활로
        else if(v === color && !seen.has(nx + "," + ny)){        // 같은 색 → 같은 그룹
          seen.add(nx + "," + ny); stack.push([nx, ny]);
        }
      }
    }
    return { stones, libs: libs.size };
  }

  for(let i = 0; i < count && i < moves.length; i++){
    const mv = moves[i];
    if(mv.pass || !inBoard(mv.x, mv.y)) continue;
    board[mv.y][mv.x] = mv.color;
    // 방금 둔 돌 옆의 '상대 그룹' 중 활로가 0이면 따냅니다(판에서 제거).
    for(const [nx, ny] of [[mv.x+1,mv.y],[mv.x-1,mv.y],[mv.x,mv.y+1],[mv.x,mv.y-1]]){
      if(inBoard(nx, ny) && board[ny][nx] === opp(mv.color)){
        const g = groupInfo(nx, ny);
        if(g.libs === 0) g.stones.forEach(([sx, sy]) => board[sy][sx] = null);
      }
    }
    // (아주 드문 자충 방지) 내 그룹이 활로 0이 되면 제거 — 정상 기보엔 거의 없음.
    const self = groupInfo(mv.x, mv.y);
    if(self.libs === 0) self.stones.forEach(([sx, sy]) => board[sy][sx] = null);
  }
  return board;
}

/* 바둑판 상태를 SVG 그림으로 만듭니다.
   - lastMove : 방금 둔 돌(표시점)
   - blueSpots: AI 추천수(블루스팟) 목록 [{x,y,text}] — 있으면 파란 점으로 그립니다. */
function renderBoardSvg(size, board, lastMove, blueSpots){
  const cell = 26, pad = 22, W = pad * 2 + cell * (size - 1);
  let s = `<svg viewBox="0 0 ${W} ${W}" width="100%" style="max-width:520px;background:#e3b96b;border-radius:8px">`;
  // 가로·세로 격자선
  for(let i = 0; i < size; i++){
    const p = pad + i * cell;
    s += `<line x1="${pad}" y1="${p}" x2="${W-pad}" y2="${p}" stroke="#5a3d1a" stroke-width="1"/>`;
    s += `<line x1="${p}" y1="${pad}" x2="${p}" y2="${W-pad}" stroke="#5a3d1a" stroke-width="1"/>`;
  }
  // 화점(19줄 기준 9개)
  if(size === 19){
    for(const gx of [3,9,15]) for(const gy of [3,9,15])
      s += `<circle cx="${pad+gx*cell}" cy="${pad+gy*cell}" r="3" fill="#5a3d1a"/>`;
  }
  // 돌 그리기
  for(let y = 0; y < size; y++) for(let x = 0; x < size; x++){
    const v = board[y][x]; if(!v) continue;
    const cx = pad + x * cell, cy = pad + y * cell;
    s += `<circle cx="${cx}" cy="${cy}" r="${cell*0.46}" fill="${v==='B'?'#111':'#fff'}" stroke="${v==='B'?'#000':'#999'}"/>`;
    if(lastMove && lastMove.x === x && lastMove.y === y)   // 방금 둔 자리 표시
      s += `<circle cx="${cx}" cy="${cy}" r="4" fill="${v==='B'?'#f44':'#d00'}"/>`;
  }
  // AI 추천수(블루스팟) 그리기 — 반투명 파란 원 + 라벨
  if(blueSpots) for(const sp of blueSpots){
    const cx = pad + sp.x * cell, cy = pad + sp.y * cell;
    s += `<circle cx="${cx}" cy="${cy}" r="${cell*0.44}" fill="#2f6bff" fill-opacity="0.55" stroke="#1a49c8"/>`;
    if(sp.text) s += `<text x="${cx}" y="${cy}" fill="#fff" font-size="11" font-weight="700" text-anchor="middle" dominant-baseline="central">${escapeHtml(sp.text)}</text>`;
  }
  return s + `</svg>`;
}

/* SGF 텍스트와 이름을 받아 재생 창을 엽니다. (모든 기보 열기의 공통 진입점) */
function openSgf(sgfText, label){
  const parsed = parseSgf(sgfText);
  // 처음엔 대국이 끝난 '최종 국면'을 보여줍니다. (이전 버튼으로 되감기 가능)
  gamePlayer = {
    size: parsed.size, moves: parsed.moves, index: parsed.moves.length,
    label: label || "기보",
    hasAnalysis: parsed.hasAnalysis,   // 이 기보에 AI 분석(블루스팟) 데이터가 있는지
    showBlue: true                     // 블루스팟 표시 켜짐/꺼짐
  };
  document.getElementById("game-modal").style.display = "flex";
  document.getElementById("game-slider").style.display = "";      // 슬라이더 다시 보이기
  document.querySelector(".game-controls").style.display = "";     // 이동 버튼 다시 보이기
  drawGame();
}

/* 블루스팟(AI 추천수) 표시를 켜고 끕니다. */
function toggleBlue(){
  if(!gamePlayer) return;
  gamePlayer.showBlue = !gamePlayer.showBlue;
  drawGame();
}

/* URL에서 SGF 텍스트를 자동으로 가져옵니다.
   - OGS(online-go.com) 대국 링크는 SGF 다운로드 주소로 자동 변환합니다.
   - 프록시(PROXIES)를 거쳐 가져오므로 CORS 문제 없이 동작합니다. */
async function fetchSgfFromUrl(url){
  // 예) https://online-go.com/game/12345  →  .../api/v1/games/12345/sgf
  const ogs = url.match(/online-go\.com\/game\/(\d+)/);
  const target = ogs ? `https://online-go.com/api/v1/games/${ogs[1]}/sgf` : url;
  let lastErr;
  for(const proxy of PROXIES){
    try{
      const res = await fetch(proxy + encodeURIComponent(target), { signal: AbortSignal.timeout(13000) });
      if(!res.ok) throw new Error("HTTP " + res.status);
      const text = await res.text();
      // SGF다운 내용인지 최소 확인 (착수 기호나 GM 태그가 있어야 함)
      if(text && (text.includes(";B[") || text.includes(";W[") || text.includes("GM[1]"))) return text;
      throw new Error("SGF 형식이 아님");
    }catch(e){ lastErr = e; }
  }
  throw lastErr || new Error("불러오기 실패");
}

/* '기보 보기' / 기보 목록을 눌렀을 때: 해당 대국을 열어 재생합니다.
   sgf가 있으면 바로 열고, sgfUrl만 있으면 자동으로 가져와서 엽니다. */
async function openGame(gameIndex){
  const game = GAMES[gameIndex];
  if(game.sgf){ openSgf(game.sgf, game.label); return; }
  if(game.sgfUrl){
    openSgf("(;SZ[19])", game.label + " · 불러오는 중…");   // 빈 판 + 로딩 표시
    try{
      const sgf = await fetchSgfFromUrl(game.sgfUrl);
      game.sgf = sgf;                 // 한 번 받아오면 저장해 두어 다음엔 즉시 열림
      openSgf(sgf, game.label);
    }catch(e){
      closeGame();
      alert("기보를 불러오지 못했습니다: " + e.message + "\n(링크가 올바른지, 잠시 뒤 다시 시도해 보세요.)");
    }
    return;
  }
  alert("이 대국에는 sgf 또는 sgfUrl이 없습니다.");
}

/* 오른쪽 '기보 불러오기' 칸: 붙여넣은 것이 링크면 자동으로 가져오고, SGF 내용이면 바로 엽니다. */
async function importSgf(){
  const input = document.getElementById("sgf-import");
  const val = (input.value || "").trim();
  if(!val){ return; }
  // 괄호로 시작하거나 착수 기호가 있으면 'SGF 내용'으로 간주.
  if(val.startsWith("(") || val.includes(";B[") || val.includes(";W[")){
    openSgf(val, "붙여넣은 기보");
  }else{
    openSgf("(;SZ[19])", "불러오는 중…");
    try{ openSgf(await fetchSgfFromUrl(val), "불러온 기보"); }
    catch(e){ closeGame(); alert("불러오기 실패: " + e.message); }
  }
}

/* =========================================================================
   기보 자동 찾기 (한국기원) — 프런트엔드 쪽
   ========================================================================= */

/* 기사 제목에서 한국기원 검색에 쓸 '한글 선수명'을 찾습니다. 없으면 null. */
function kbaKoreanName(title){
  for(const p of PLAYER_ALIASES){
    if(title.includes(p.ko)) return p.ko;                       // 한글 이름이 그대로 있으면 사용
    if(p.alias.some(a => title.includes(a))) return p.ko;        // 한자·영문 표기면 한글로 변환
  }
  return null;
}

/* '기보 찾기'를 눌렀을 때: 한국기원에서 그 대국을 찾아 재생합니다. */
let kbaCandidates = [];   // 후보 목록 임시 저장
async function findKifu(articleId){
  const a = allArticles.find(x => x.id === articleId);
  if(!a) return;
  const name = kbaKoreanName(a.title);
  if(!name){ alert("이 기사에서 검색할 선수 이름을 못 찾았습니다."); return; }

  const day = new Date(parseDate(a.date)).toISOString().slice(0, 10);   // 기사 날짜 YYYY-MM-DD
  openSgf("(;SZ[19])", "한국기원에서 기보 찾는 중…");   // 로딩 표시(빈 판)
  try{
    const res = await fetch(`/api/kba?player=${encodeURIComponent(name)}&date=${encodeURIComponent(day)}&title=${encodeURIComponent(a.title)}`);
    const data = await res.json();
    if(data.error) throw new Error(data.error);

    if(data.best){
      // 신뢰도 높음 → 바로 재생 (출처 표기)
      openSgf("(;SZ[19])", data.best.label + " · 불러오는 중…");
      openSgf(await fetchSgfFromUrl(data.best.sgfUrl), data.best.label + "  ·  출처: 한국기원");
    }else if(data.candidates && data.candidates.length){
      showCandidates(data.candidates);   // 애매함 → 후보 고르게
    }else{
      closeGame();
      alert("한국기원에서 이 대국의 기보를 찾지 못했습니다.\n(선수 이름이 정확한지 확인하거나, 오른쪽 '기보 불러오기'로 직접 링크를 넣어보세요.)");
    }
  }catch(e){
    closeGame();
    alert("기보 찾기 실패: " + e.message);
  }
}

/* 후보가 여러 개일 때: 재생 창에 대국 목록을 보여주고 고르게 합니다. */
function showCandidates(cands){
  kbaCandidates = cands;
  gamePlayer = null;
  document.getElementById("game-modal").style.display = "flex";
  document.getElementById("game-title").textContent = "어느 대국인가요? (한국기원 검색 결과)";
  document.getElementById("game-counter").textContent = "";
  document.getElementById("game-slider").style.display = "none";      // 슬라이더 숨김
  document.querySelector(".game-controls").style.display = "none";     // 이동 버튼 숨김
  document.getElementById("game-board").innerHTML =
    `<div style="width:100%">` +

      `<button class="game-link" onclick="openKbaCandidate(${i})">

    `<div style="font-size:12px;color:var(--muted);margin-top:6px">출처: 한국기원(baduk.or.kr)</div></div>`;
}

/* 후보 목록에서 하나를 골랐을 때: 그 대국 SGF를 열어 재생합니다. */
async function openKbaCandidate(i){
  const c = kbaCandidates[i];
  openSgf("(;SZ[19])", c.label + " · 불러오는 중…");
  try{ openSgf(await fetchSgfFromUrl(c.sgfUrl), c.label + "  ·  출처: 한국기원"); }
  catch(e){ closeGame(); alert("불러오기 실패: " + e.message); }
}


/* 현재 상태(index수까지)를 바둑판에 다시 그립니다. */
function drawGame(){
  const gp = gamePlayer; if(!gp) return;
  const board = buildBoard(gp.size, gp.moves, gp.index);
  const cur = gp.index > 0 ? gp.moves[gp.index-1] : null;
  const last = (cur && !cur.pass) ? cur : null;
  // 블루스팟: 현재 수 노드에 AI 분석 라벨이 있고, 표시가 켜져 있으면 넘겨줍니다.
  const blue = (gp.showBlue && cur && cur.labels && cur.labels.length) ? cur.labels : null;
  document.getElementById("game-board").innerHTML = renderBoardSvg(gp.size, board, last, blue);
  document.getElementById("game-title").textContent = gp.label;
  document.getElementById("game-counter").textContent = `${gp.index} / ${gp.moves.length}수`;
  const slider = document.getElementById("game-slider");
  slider.max = gp.moves.length; slider.value = gp.index;

  // AI 분석(블루스팟) 버튼/안내 갱신
  const btn = document.getElementById("blue-toggle");
  const note = document.getElementById("blue-note");
  if(gp.hasAnalysis){
    btn.style.display = "";
    btn.textContent = gp.showBlue ? "🔵 AI추천수 끄기" : "🔵 AI추천수 켜기";
    note.textContent = "";
  }else{
    btn.style.display = "none";
    note.textContent = "이 기보엔 AI 분석 데이터가 없어 블루스팟이 표시되지 않습니다.";
  }
}

/* 처음/이전/다음/끝 버튼 처리. */
function gameGo(where){
  const gp = gamePlayer; if(!gp) return;
  const n = gp.moves.length;
  if(where === "first") gp.index = 0;
  else if(where === "prev") gp.index = Math.max(0, gp.index - 1);
  else if(where === "next") gp.index = Math.min(n, gp.index + 1);
  else if(where === "last") gp.index = n;
  drawGame();
}

/* 슬라이더를 움직였을 때: 그 수까지로 이동. */
function gameSeek(value){ if(gamePlayer){ gamePlayer.index = parseInt(value, 10); drawGame(); } }

/* 재생 창 닫기. */
function closeGame(){ document.getElementById("game-modal").style.display = "none"; gamePlayer = null; }

/* 키보드 ← → 로 수 넘기기, Esc로 닫기. */
document.addEventListener("keydown", e => {
  if(!gamePlayer) return;
  if(e.key === "ArrowRight") gameGo("next");
  else if(e.key === "ArrowLeft") gameGo("prev");
  else if(e.key === "Escape") closeGame();
});

/* 기사 제목이 어떤 대국(GAMES)의 match 단어와 맞으면 그 대국 번호를, 없으면 -1을 돌려줍니다. */
function gameForArticle(article){
  for(let i = 0; i < GAMES.length; i++){
    const g = GAMES[i];
    if(g.match && g.match.some(k => article.title.includes(k))) return i;
  }
  return -1;
}

/* 카드 왼쪽의 사진(썸네일) 영역 HTML을 만듭니다.
   실제 사진이 있으면 사진을, 없거나 사진이 깨지면 자동 썸네일(바둑판 모양)을 보여줍니다. */
function thumbHtml(article){
  if(!SHOW_IMAGES) return "";
  // 자동 썸네일은 항상 뒤에 깔아두고, 실제 사진이 있으면 그 위에 덮어씌웁니다.
  // 사진 주소가 깨지면(onerror) 사진을 숨겨서 뒤의 자동 썸네일이 드러나게 합니다.
  const placeholder = `<div class="thumb-ph ${escapeHtml(article.lang)}">
       <div class="stone"></div>
       <div class="ph-source">${escapeHtml(article.source)}</div>
     </div>`;
  const realImg = article.image
    ? `<img src="${escapeHtml(article.image)}" loading="lazy" alt="" onerror="this.style.display='none'">`
    : "";
  return `<div class="thumb">${placeholder}${realImg}</div>`;
}

/* 카드 하나(기사 하나)의 HTML을 만들어 돌려줍니다. */
function cardHtml(article, isSpotlight){
  const players = matchedPlayers(article.title);
  // 선수가 걸린 경우, 어떤 선수인지 작은 태그로 보여줍니다.
  const playerTags = players.length
    ? ` · <span style="color:var(--gold)">⭐ ${players.join(", ")}</span>` : "";

  // 기보 버튼 결정:
  //  ① 등록된 대국(GAMES)과 매칭되면 → '기보 보기'(직접 등록한 기보)
  //  ② 아니면 제목에 한국기원 대상 선수가 있으면 → '기보 찾기'(한국기원 자동 검색)
  const gameIdx = gameForArticle(article);
  let gameBtn = "";
  if(gameIdx >= 0){
    gameBtn = `<button class="btn-sm" onclick="openGame(${gameIdx})">🔳 기보 보기</button>`;
  }else if(KBA_ENABLED && kbaKoreanName(article.title)){
    gameBtn = `<button class="btn-sm" onclick="findKifu('${article.id}')">🔳 기보 찾기</button>`;
  }

  return `
    <div class="card ${isSpotlight ? "spotlight" : ""}" data-id="${article.id}">
      ${thumbHtml(article)}
      <div class="card-body">
        <h3><a href="${article.link}" target="_blank" rel="noopener">${escapeHtml(article.title)}</a></h3>
        <div class="card-meta">
          <span class="lang-tag">${langLabel(article.lang)}</span>
          <span>${escapeHtml(article.source)}</span>
          <span>${formatDate(article.date)}${playerTags}</span>
        </div>
        <div class="card-actions">
          <button class="btn-sm" onclick="onSummarizeClick('${article.id}')">✨ 요약</button>
          ${gameBtn}
        </div>
        <div class="summary-box" id="summary-${article.id}" style="display:none;"></div>
      </div>
    </div>
  `;
}

/* -------------------------------------------------------------------------
   RSS 한 개(<item>)에서 대표 사진 주소를 찾아 돌려줍니다. 없으면 null.
   RSS마다 사진을 담는 방식이 달라서, 흔한 위치들을 순서대로 살펴봅니다.
   ------------------------------------------------------------------------- */
function extractImage(item){
  // (1) media:content / media:thumbnail 태그의 url 속성
  for(const tag of ["media:content", "media:thumbnail"]){
    const el = item.getElementsByTagName(tag)[0];
    const url = el?.getAttribute("url");
    if(url) return url;
  }
  // (2) enclosure 태그(첨부파일)가 이미지인 경우
  const enc = item.getElementsByTagName("enclosure")[0];
  if(enc && (enc.getAttribute("type") || "").startsWith("image")) return enc.getAttribute("url");
  // (3) 본문(description / content:encoded) 안에 들어있는 <img> 태그의 주소
  const html = (item.querySelector("description")?.textContent || "")
             + (item.getElementsByTagName("content:encoded")[0]?.textContent || "");
  const m = html.match(/<img[^>]+src=["']([^"']+)["']/i);
  if(m) return m[1];
  return null;
}


/* -------------------------------------------------------------------------
   프록시 목록(PROXIES)을 위에서부터 시도해, 되는 것으로 RSS 내용을 가져옵니다.
   하나가 느리거나(13초 초과) 죽어 있으면 다음 프록시로 자동 전환합니다.
   ------------------------------------------------------------------------- */
async function fetchViaProxy(url){
  let lastErr;
  for(const proxy of PROXIES){
    try{
      const res = await fetch(proxy + encodeURIComponent(url), { signal: AbortSignal.timeout(13000) });
      if(!res.ok) throw new Error("HTTP " + res.status);
      const text = await res.text();
      // 제대로 된 RSS인지 최소한만 확인합니다(<item> 태그가 있어야 함).
      if(text && text.includes("<item")) return text;
      throw new Error("RSS 형식이 아님");
    }catch(e){
      lastErr = e;   // 이 프록시는 실패 → 다음 프록시로
    }
  }
  throw lastErr || new Error("모든 프록시 실패");
}

/* 기사 제목에 KEYWORDS 중 하나라도 들어있으면 '바둑 기사'로 봅니다. (filter 소스용) */
function isBadukArticle(article){
  return KEYWORDS.some(k => article.title.includes(k));
}

/* -------------------------------------------------------------------------
   RSS 한 개를 가져와 기사 배열로 바꿔 돌려줍니다.
   한 소스가 실패해도 전체가 멈추지 않도록, 실패 시 표시만 남깁니다.
   ------------------------------------------------------------------------- */
async function fetchSource(source){
  try{
    const xmlText = await fetchViaProxy(source.url);

    // 받아온 XML(RSS) 글자를 브라우저가 읽을 수 있는 형태로 해석합니다.
    const doc = new DOMParser().parseFromString(xmlText, "text/xml");
    const items = [...doc.querySelectorAll("item")];

    // RSS의 각 <item>을 우리가 쓰기 쉬운 형태로 정리합니다.
    let articles = items.map((item, i) => ({
      id: `${source.lang}-${i}-${Math.random().toString(36).slice(2,7)}`, // 카드 구분용 임시 번호
      title:  (item.querySelector("title")?.textContent || "(제목 없음)").trim(),
      link:    item.querySelector("link")?.textContent?.trim() || "#",
      date:    item.querySelector("pubDate")?.textContent?.trim() || "",
      source:  source.name,
      lang:    source.lang,
      image:   SHOW_IMAGES ? extractImage(item) : null,  // RSS에 사진이 있으면 그 주소, 없으면 null
    }));

    // filter가 켜진 소스(연합·조선 등)는 바둑 관련 기사만 남깁니다.
    if(source.filter) articles = articles.filter(isBadukArticle);
    return articles;
  }catch(err){
    // 실패한 소스는 콘솔에만 기록하고, 화면 전체는 계속 진행합니다.
    console.warn("소스 불러오기 실패:", source.name, err);
    return { __failed: true, name: source.name };
  }
}


/* -------------------------------------------------------------------------
   (선택 기능) 기사 페이지에 들어가 대표사진(og:image)을 가져옵니다.
   FETCH_OG_IMAGE 옵션이 켜져 있을 때만, 사진이 없는 기사에 대해 실행됩니다.
   한 기사라도 실패하면 그 기사만 조용히 건너뜁니다.
   ------------------------------------------------------------------------- */
async function fetchOgImage(url){
  try{
    const res = await fetch(PROXY + encodeURIComponent(url), { signal: AbortSignal.timeout(7000) });
    if(!res.ok) return null;
    const html = await res.text();
    // <meta property="og:image" content="..."> 에서 사진 주소를 뽑아냅니다.
    const m = html.match(/<meta[^>]+(?:property|name)=["']og:image["'][^>]*content=["']([^"']+)["']/i)
           || html.match(/<meta[^>]+content=["']([^"']+)["'][^>]*(?:property|name)=["']og:image["']/i);
    return m ? m[1] : null;
  }catch(e){ return null; }
}

/* 사진 없는 기사들에 og:image를 채워 넣고, 다 되면 화면을 다시 그립니다. */
async function enrichWithOgImages(){
  if(!FETCH_OG_IMAGE || !SHOW_IMAGES) return;
  const targets = allArticles.filter(a => !a.image).slice(0, OG_FETCH_LIMIT);
  await Promise.all(targets.map(async a => { a.image = await fetchOgImage(a.link); }));
  // 사진이 새로 채워졌으니 카드들을 다시 그립니다.
  renderSpotlight();
  renderNews();
}


/* 스포트라이트와 뉴스 목록을 한꺼번에 다시 그립니다. */
function renderAll(){ renderSpotlight(); renderNews(); }

/* 같은 기사(같은 링크)가 여러 소스에서 중복으로 들어오면 하나만 남깁니다. */
function dedupe(articles){
  const seen = new Set();
  return articles.filter(a => {
    const key = a.link || a.title;
    if(seen.has(key)) return false;
    seen.add(key); return true;
  });
}

/* 최신순 정렬(날짜를 못 읽는 기사는 뒤로). */
function sortByDate(articles){
  return articles.sort((a, b) => parseDate(b.date) - parseDate(a.date));
}

/* 불러온 기사를 브라우저에 저장(캐시)합니다. → 다음 접속 때 즉시 보여줄 수 있습니다. */
const CACHE_KEY = "baduk-news-cache-v1";
function saveCache(articles){
  try{ localStorage.setItem(CACHE_KEY, JSON.stringify(articles)); }catch(e){}
}
function loadCache(){
  try{
    const data = JSON.parse(localStorage.getItem(CACHE_KEY));
    return Array.isArray(data) ? data : null;
  }catch(e){ return null; }
}


/* -------------------------------------------------------------------------
   모든 소스를 가져와 화면을 채우는 메인 함수. (페이지가 열릴 때 실행됩니다.)
   빠르게 느껴지도록 두 가지를 합니다:
   ① 캐시(지난 결과)가 있으면 '즉시' 먼저 보여줍니다.
   ② 각 소스는 도착하는 대로 바로 화면에 반영합니다(제일 느린 소스를 안 기다림).
   ------------------------------------------------------------------------- */
async function loadNews(){
  const newsBox = document.getElementById("news");

  // (1) 캐시가 있으면 지난 결과를 즉시 표시하고, 위에 '갱신 중' 안내를 붙입니다.
  const cached = loadCache();
  const hadCache = !!(cached && cached.length);
  if(hadCache){
    allArticles = cached;
    renderAll();
    newsBox.insertAdjacentHTML("afterbegin",
      `<div class="status" style="margin-bottom:12px;">🔄 최신 뉴스로 갱신 중…</div>`);
  }else{
    document.getElementById("spotlight-wrap").innerHTML = "";
    newsBox.innerHTML = `<div class="status">⏳ 뉴스를 불러오는 중입니다…</div>`;
  }

  // (2) 각 소스를 동시에 요청하되, 도착하는 것부터 바로 화면에 반영합니다.
  const fresh = [];
  const failed = [];
  await Promise.all(SOURCES.map(async source => {
    const result = await fetchSource(source);
    if(result && result.__failed){ failed.push(result.name); return; }
    fresh.push(...result);
    allArticles = sortByDate(dedupe(fresh));
    renderAll();                          // 새 소스가 올 때마다 즉시 갱신
  }));

  // (3) 새로 불러온 게 하나도 없으면: 캐시가 있으면 그대로 두고, 없으면 에러 안내.
  if(fresh.length === 0){
    if(hadCache){
      newsBox.insertAdjacentHTML("afterbegin",
        `<div class="status error" style="margin-bottom:12px;">지금 최신 뉴스를 못 불러와 <b>지난 결과</b>를 보여주고 있어요. 잠시 뒤 새로고침(F5) 해보세요.</div>`);
    }else{
      newsBox.innerHTML = `
        <div class="status error">
          <b>뉴스를 불러오지 못했습니다.</b><br><br>
          가능한 원인과 해결 방법:<br>
          • 인터넷 연결이 끊겼을 수 있어요 → 연결을 확인하고 새로고침(F5) 하세요.<br>
          • 프록시(중계 서버)가 일시적으로 느리거나 멈췄을 수 있어요 → 1~2분 뒤 다시 새로고침 하세요.<br>
          • RSS 주소가 잘못됐을 수 있어요 → 설정 구역의 SOURCES에서 url을 확인하세요.<br>
          ${failed.length ? `<br>실패한 소스: ${failed.join(", ")}` : ""}
        </div>`;
    }
    return;
  }

  // (4) 최종 결과를 저장(캐시)하고, 일부 실패가 있으면 작은 경고를 붙입니다.
  saveCache(allArticles);
  if(failed.length){
    newsBox.insertAdjacentHTML("afterbegin",
      `<div class="status error" style="margin-bottom:12px;">일부 소스를 못 불러왔습니다: <b>${failed.join(", ")}</b> (나머지는 정상 표시됨)</div>`);
  }

  // (5) (옵션) 사진 없는 기사에 대표사진을 뒤늦게 채워 넣습니다. (FETCH_OG_IMAGE가 켜졌을 때만)
  enrichWithOgImages();
}

/* '요약' 버튼을 눌렀을 때 실행됩니다. summary 박스를 열고 결과를 채웁니다. */
async function onSummarizeClick(articleId){
  const box = document.getElementById("summary-" + articleId);
  if(!box) return;
  // 이미 열려 있으면 닫습니다(토글).
  if(box.style.display === "block"){ box.style.display = "none"; return; }

  box.style.display = "block";
  box.textContent = "요약 준비 중…";

  const article = allArticles.find(a => a.id === articleId);
  box.textContent = await summarizeArticle(article);
}


/* ---- 아래는 자잘한 도우미 함수들입니다. (거의 건드릴 일 없음) ---- */

/* 날짜 문자열을 시간(숫자)으로 바꿔 정렬에 씁니다. 못 읽으면 0. */
function parseDate(str){
  const t = Date.parse(str);
  return isNaN(t) ? 0 : t;
}

/* 날짜를 보기 좋은 형태로 바꿉니다. (예: 2026. 7. 22.) */
function formatDate(str){
  const t = Date.parse(str);
  if(isNaN(t)) return "날짜 미상";
  return new Date(t).toLocaleDateString("ko-KR");
}

/* 제목 등에 이상한 기호(<, >)가 있어도 화면이 깨지지 않게 안전하게 바꿉니다. */
function escapeHtml(str){
  return String(str)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
